<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fluid Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;top:0;right:0;width:280px;height:100%;background:rgba(8,8,16,0.92);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,0.05);overflow-y:auto;z-index:10;padding:10px;color:#bbb;font-size:11px;transition:transform .35s cubic-bezier(.4,0,.2,1);scrollbar-width:thin;scrollbar-color:rgba(232,112,64,0.3) transparent}
#ui.hidden{transform:translateX(100%)}
#ui::-webkit-scrollbar{width:4px}
#ui::-webkit-scrollbar-thumb{background:rgba(232,112,64,0.3);border-radius:2px}
#toggle{position:fixed;top:10px;right:10px;z-index:20;background:rgba(20,20,30,0.85);border:1px solid rgba(255,255,255,0.08);color:#999;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
#toggle:hover{color:#e87040;border-color:rgba(232,112,64,0.3)}
.s{margin-bottom:6px;border:1px solid rgba(255,255,255,0.04);border-radius:6px;overflow:hidden}
.sh{padding:7px 9px;background:rgba(255,255,255,0.02);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#777;user-select:none}
.sh:hover{background:rgba(255,255,255,0.04)}
.sh .a{transition:transform .2s;font-size:9px}
.sh.x .a{transform:rotate(-90deg)}
.sb{padding:7px 9px}
.sb.x{display:none}
.r{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:4px}
.r label{flex:1;color:#888;font-size:10px;white-space:nowrap}
.r input[type=range]{flex:2;accent-color:#e87040;height:3px;-webkit-appearance:none;background:rgba(255,255,255,0.06);border-radius:2px;outline:none}
.r input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#e87040;cursor:pointer}
.r .v{width:36px;text-align:right;color:#e87040;font-size:10px;font-family:'SF Mono',monospace}
.r input[type=checkbox]{accent-color:#e87040;width:14px;height:14px}
.b{padding:4px 8px;background:rgba(232,112,64,0.12);border:1px solid rgba(232,112,64,0.25);color:#e87040;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600;transition:all .15s}
.b:hover{background:rgba(232,112,64,0.25)}
.br{display:flex;gap:4px;margin-top:4px}
.br .b{flex:1;text-align:center}
select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#bbb;padding:2px 4px;border-radius:3px;font-size:10px}
input[type=color]{width:28px;height:20px;border:none;background:none;cursor:pointer}
#fps{position:fixed;top:10px;left:10px;color:rgba(232,112,64,0.5);font-size:10px;font-family:'SF Mono',monospace;z-index:10;pointer-events:none}
.hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.15);font-size:12px;pointer-events:none;z-index:5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fps"></div>
<div class="hint">Click & drag · Scroll to resize brush</div>
<button id="toggle">⚙</button>
<div id="ui">
<div class="s"><div class="sh">Simulation <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Resolution</label><select id="s-res"><option value="0.25">Low</option><option value="0.5" selected>Medium</option><option value="1">High</option></select></div>
<div class="r"><label>Pressure Iterations</label><input type="range" id="s-pi" min="5" max="80" value="20"><span class="v" id="v-pi">20</span></div>
<div class="r"><label>Curl (Vorticity)</label><input type="range" id="s-curl" min="0" max="50" value="30"><span class="v" id="v-curl">30</span></div>
<div class="r"><label>Velocity Dissipation</label><input type="range" id="s-vd" min="0" max="4" value="0.2" step="0.01"><span class="v" id="v-vd">0.20</span></div>
<div class="r"><label>Density Dissipation</label><input type="range" id="s-dd" min="0" max="4" value="1.0" step="0.01"><span class="v" id="v-dd">1.00</span></div>
<div class="r"><label>Pressure Dissipation</label><input type="range" id="s-pd" min="0" max="1" value="0.8" step="0.01"><span class="v" id="v-pd">0.80</span></div>
</div></div>
<div class="s"><div class="sh">Brush <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Radius</label><input type="range" id="b-rad" min="0.01" max="0.5" value="0.25" step="0.005"><span class="v" id="v-rad">0.25</span></div>
<div class="r"><label>Force</label><input type="range" id="b-force" min="500" max="15000" value="6000" step="100"><span class="v" id="v-force">6000</span></div>
<div class="r"><label>Dye Amount</label><input type="range" id="b-dye" min="0" max="5" value="1.0" step="0.05"><span class="v" id="v-dye">1.00</span></div>
<div class="r"><label>Rainbow</label><input type="checkbox" id="b-rainbow" checked></div>
<div class="r"><label>Color</label><input type="color" id="b-color" value="#e87040"></div>
</div></div>
<div class="s"><div class="sh">Auto Splats <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Auto Spawn</label><input type="checkbox" id="a-auto" checked></div>
<div class="r"><label>Interval</label><input type="range" id="a-int" min="0.3" max="5" value="1.2" step="0.1"><span class="v" id="v-int">1.2</span></div>
<div class="r"><label>Count</label><input type="range" id="a-count" min="1" max="8" value="3"><span class="v" id="v-count">3</span></div>
</div></div>
<div class="s"><div class="sh">Shading <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Enable Shading</label><input type="checkbox" id="sh-on" checked></div>
<div class="r"><label>Light Intensity</label><input type="range" id="sh-li" min="0" max="3" value="1.5" step="0.05"><span class="v" id="v-li">1.50</span></div>
<div class="r"><label>Specular</label><input type="range" id="sh-sp" min="0" max="2" value="0.8" step="0.05"><span class="v" id="v-sp">0.80</span></div>
<div class="r"><label>Normal Strength</label><input type="range" id="sh-ns" min="0.1" max="5" value="1.5" step="0.1"><span class="v" id="v-ns">1.50</span></div>
</div></div>
<div class="s"><div class="sh">Visual <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Brightness</label><input type="range" id="v-bright" min="0.1" max="3" value="1.0" step="0.05"><span class="v" id="v-vb">1.00</span></div>
<div class="r"><label>Saturation</label><input type="range" id="v-sat" min="0" max="3" value="1.2" step="0.05"><span class="v" id="v-vs">1.20</span></div>
<div class="r"><label>Color Multiplier</label><input type="range" id="v-cm" min="0.1" max="5" value="1.5" step="0.1"><span class="v" id="v-vm">1.50</span></div>
<div class="r"><label>Dithering</label><input type="checkbox" id="v-dither" checked></div>
<div class="r"><label>Background</label><input type="color" id="v-bg" value="#000000"></div>
</div></div>
<div class="s"><div class="sh">Post FX <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Bloom</label><input type="checkbox" id="p-bloom" checked></div>
<div class="r"><label>Bloom Intensity</label><input type="range" id="p-bi" min="0" max="2" value="0.8" step="0.05"><span class="v" id="v-bi">0.80</span></div>
<div class="r"><label>Bloom Threshold</label><input type="range" id="p-bt" min="0" max="1" value="0.5" step="0.01"><span class="v" id="v-bt">0.50</span></div>
<div class="r"><label>Bloom Soft Knee</label><input type="range" id="p-sk" min="0" max="1" value="0.7" step="0.01"><span class="v" id="v-sk">0.70</span></div>
<div class="r"><label>Sunrays</label><input type="checkbox" id="p-sun" checked></div>
<div class="r"><label>Sunrays Weight</label><input type="range" id="p-sw" min="0" max="2" value="0.8" step="0.05"><span class="v" id="v-sw">0.80</span></div>
</div></div>
<div class="s"><div class="sh">Debug <span class="a">▾</span></div><div class="sb">
<div class="r"><label>Pause</label><input type="checkbox" id="d-pause"></div>
<div class="r"><label>Wireframe (vel)</label><input type="checkbox" id="d-vel"></div>
</div></div>
<div class="s"><div class="sb"><div class="br">
<button class="b" id="a-random">Random Splats</button>
<button class="b" id="a-clear">Clear</button>
<button class="b" id="a-screenshot">Screenshot</button>
</div></div></div>
</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: false, preserveDrawingBuffer: false, antialias: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:20px">WebGL 2 required.</p>'; throw 'no webgl2'; }

// Extensions
gl.getExtension('EXT_color_buffer_half_float');
gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');

// Config
const C = {
  SIM_RES: 0.5, DYE_RES: 0.5, PRESSURE_ITERS: 20, CURL: 30,
  VEL_DISS: 0.2, DENSITY_DISS: 1.0, PRESSURE_DISS: 0.8,
  BRUSH_RADIUS: 0.25, BRUSH_FORCE: 6000, BRUSH_DYE: 1.0, RAINBOW: true, BRUSH_COLOR: [0.91,0.44,0.25],
  AUTO: true, AUTO_INT: 1.2, AUTO_COUNT: 3,
  SHADING: true, LIGHT_INTENSITY: 1.5, SPECULAR: 0.8, NORMAL_STRENGTH: 1.5,
  BRIGHTNESS: 1.0, SATURATION: 1.2, COLOR_MULT: 1.5, DITHER: true, BG_COLOR: [0,0,0],
  BLOOM: true, BLOOM_INTENSITY: 0.8, BLOOM_THRESHOLD: 0.5, BLOOM_SOFT_KNEE: 0.7,
  SUNRAYS: true, SUNRAYS_WEIGHT: 0.8,
  PAUSED: false, SHOW_VEL: false,
};

// Shader compilation
function cs(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
  return s;
}
function cp(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
  const u = {};
  for (let i = 0; i < gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS); i++) {
    const info = gl.getActiveUniform(p, i);
    u[info.name] = gl.getUniformLocation(p, info.name);
  }
  return { program: p, uniforms: u };
}

// Vertex shader
const VERT = `#version 300 es
in vec2 a;
out vec2 v;
void main(){v=a*0.5+0.5;gl_Position=vec4(a,0,1);}`;

// Fragment shaders
const SPLAT = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_target;uniform float u_aspect;uniform vec3 u_color;uniform vec2 u_point;uniform float u_radius;
void main(){vec2 p=v-u_point;p.x*=u_aspect;o=vec4(texture(u_target,v).rgb+exp(-dot(p,p)/u_radius)*u_color,1);}`;

const ADVECTION = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_vel,u_src;uniform vec2 u_ts;uniform float u_dt,u_diss;
void main(){
  vec2 coord=v-u_dt*texture(u_vel,v).xy*u_ts;
  vec4 result=u_diss*texture(u_src,coord);
  // MacCormack: forward then backward to get error estimate
  vec2 coord2=coord+u_dt*texture(u_vel,coord).xy*u_ts;
  vec4 original=texture(u_src,v);
  vec4 error=original-texture(u_src,coord2);
  result+=error*0.5;
  o=vec4(max(result.rgb,0.0),1);
}`;

const DIVERGENCE = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_vel;uniform vec2 u_ts;
void main(){
  float L=texture(u_vel,v-vec2(u_ts.x,0)).x;
  float R=texture(u_vel,v+vec2(u_ts.x,0)).x;
  float B=texture(u_vel,v-vec2(0,u_ts.y)).y;
  float T=texture(u_vel,v+vec2(0,u_ts.y)).y;
  o=vec4(0.5*(R-L+T-B),0,0,1);
}`;

const CURL = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_vel;uniform vec2 u_ts;
void main(){
  float L=texture(u_vel,v-vec2(u_ts.x,0)).y;
  float R=texture(u_vel,v+vec2(u_ts.x,0)).y;
  float B=texture(u_vel,v-vec2(0,u_ts.y)).x;
  float T=texture(u_vel,v+vec2(0,u_ts.y)).x;
  o=vec4(R-L-T+B,0,0,1);
}`;

const VORTICITY = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_vel,u_curl;uniform vec2 u_ts;uniform float u_str,u_dt;
void main(){
  float L=texture(u_curl,v-vec2(u_ts.x,0)).x;
  float R=texture(u_curl,v+vec2(u_ts.x,0)).x;
  float B=texture(u_curl,v-vec2(0,u_ts.y)).x;
  float T=texture(u_curl,v+vec2(0,u_ts.y)).x;
  float C=texture(u_curl,v).x;
  vec2 f=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L));
  f/=max(length(f),1e-5);f*=u_str*C;f.y*=-1.0;
  o=vec4(texture(u_vel,v).xy+f*u_dt,0,1);
}`;

const PRESSURE = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_pres,u_div;uniform vec2 u_ts;
void main(){
  float L=texture(u_pres,v-vec2(u_ts.x,0)).x;
  float R=texture(u_pres,v+vec2(u_ts.x,0)).x;
  float B=texture(u_pres,v-vec2(0,u_ts.y)).x;
  float T=texture(u_pres,v+vec2(0,u_ts.y)).x;
  o=vec4((L+R+B+T-texture(u_div,v).x)*0.25,0,0,1);
}`;

const GRAD_SUB = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_pres,u_vel;uniform vec2 u_ts;
void main(){
  float L=texture(u_pres,v-vec2(u_ts.x,0)).x;
  float R=texture(u_pres,v+vec2(u_ts.x,0)).x;
  float B=texture(u_pres,v-vec2(0,u_ts.y)).x;
  float T=texture(u_pres,v+vec2(0,u_ts.y)).x;
  o=vec4(texture(u_vel,v).xy-vec2(R-L,T-B)*0.5,0,1);
}`;

const CLEAR = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_tex;uniform float u_val;
void main(){o=u_val*texture(u_tex,v);}`;

// THE KEY SHADER — shading makes it look real
const DISPLAY = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_dye,u_bloom,u_sun;
uniform bool u_useBloom,u_useSun,u_useShading,u_dither;
uniform float u_bright,u_sat,u_cm,u_sunW;
uniform vec3 u_bg;
uniform vec2 u_texelSize;
uniform float u_lightIntensity,u_specular,u_normalStr;

vec3 dither3(vec3 c){
  float d=fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453);
  return c+(d-0.5)/255.0;
}

void main(){
  vec3 c=texture(u_dye,v).rgb*u_cm;
  
  // SHADING: compute normal from dye density gradient for 3D liquid surface look
  if(u_useShading){
    float d=dot(c,vec3(0.299,0.587,0.114));
    float dx=dot(texture(u_dye,v+vec2(u_texelSize.x,0)).rgb,vec3(0.299,0.587,0.114))-dot(texture(u_dye,v-vec2(u_texelSize.x,0)).rgb,vec3(0.299,0.587,0.114));
    float dy=dot(texture(u_dye,v+vec2(0,u_texelSize.y)).rgb,vec3(0.299,0.587,0.114))-dot(texture(u_dye,v-vec2(0,u_texelSize.y)).rgb,vec3(0.299,0.587,0.114));
    vec3 normal=normalize(vec3(-dx*u_normalStr,-dy*u_normalStr,1.0));
    // Light from upper-left
    vec3 lightDir=normalize(vec3(-0.5,0.5,1.0));
    vec3 viewDir=vec3(0,0,1);
    vec3 halfVec=normalize(lightDir+viewDir);
    float diff=max(dot(normal,lightDir),0.0);
    float spec=pow(max(dot(normal,halfVec),0.0),32.0)*u_specular;
    float ambient=0.3;
    c*=(ambient+diff*u_lightIntensity)+spec*vec3(1);
  }
  
  // Post effects
  if(u_useBloom)c+=texture(u_bloom,v).rgb;
  if(u_useSun)c*=texture(u_sun,v).r;
  c*=u_bright;
  float gray=dot(c,vec3(0.2126,0.7152,0.0722));
  c=mix(vec3(gray),c,u_sat);
  c=max(c,u_bg);
  if(u_dither)c=dither3(c);
  o=vec4(c,1);
}`;

const BLOOM_PREFILTER = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_tex;uniform float u_threshold,u_knee;
void main(){
  vec3 c=texture(u_tex,v).rgb;
  float br=max(c.r,max(c.g,c.b));
  float soft=br-u_threshold+u_knee;
  soft=clamp(soft,0.0,2.0*u_knee);soft=soft*soft/(4.0*u_knee+1e-4);
  float contrib=max(soft,br-u_threshold);contrib/=max(br,1e-4);
  o=vec4(c*contrib,1);
}`;

const BLOOM_BLUR = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_tex;uniform vec2 u_ts,u_dir;
void main(){
  vec4 s=vec4(0);
  vec2 o1=1.3846153846*u_dir*u_ts;vec2 o2=3.2307692308*u_dir*u_ts;
  s+=texture(u_tex,v)*0.2270270270;
  s+=texture(u_tex,v+o1)*0.3162162162;s+=texture(u_tex,v-o1)*0.3162162162;
  s+=texture(u_tex,v+o2)*0.0702702703;s+=texture(u_tex,v-o2)*0.0702702703;
  o=s;
}`;

const BLOOM_FINAL = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_tex;uniform float u_intensity;
void main(){o=u_intensity*texture(u_tex,v);}`;

const SUNRAYS_MASK = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_tex;
void main(){vec3 c=texture(u_tex,v).rgb;float m=max(c.r,max(c.g,c.b));o=vec4(m,m,m,1);}`;

const SUNRAYS = `#version 300 es
precision highp float;
in vec2 v;out vec4 o;
uniform sampler2D u_tex;uniform float u_weight;
void main(){
  float decay=0.96;vec2 dir=(v-0.5)*(1.0/120.0);
  vec3 c=vec3(0);float ill=1.0;vec2 uv=v;
  for(int i=0;i<120;i++){uv-=dir;c+=texture(u_tex,uv).rgb*ill*u_weight;ill*=decay;}
  o=vec4(c,1);
}`;

// Programs
const P = {
  splat: cp(VERT, SPLAT), advection: cp(VERT, ADVECTION),
  divergence: cp(VERT, DIVERGENCE), curl: cp(VERT, CURL),
  vorticity: cp(VERT, VORTICITY), pressure: cp(VERT, PRESSURE),
  gradSub: cp(VERT, GRAD_SUB), clear: cp(VERT, CLEAR),
  display: cp(VERT, DISPLAY), bloomPrefilter: cp(VERT, BLOOM_PREFILTER),
  bloomBlur: cp(VERT, BLOOM_BLUR), bloomFinal: cp(VERT, BLOOM_FINAL),
  sunrays: cp(VERT, SUNRAYS), sunraysMask: cp(VERT, SUNRAYS_MASK),
};

// Quad VAO
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
gl.bindVertexArray(null);

// FBO helpers
function createFBO(w, h, internalFmt, fmt, type, filter) {
  gl.activeTexture(gl.TEXTURE0);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFmt, w, h, 0, fmt, type, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.viewport(0, 0, w, h); gl.clear(gl.COLOR_BUFFER_BIT);
  return { texture: tex, fbo, width: w, height: h, attach(id) { gl.activeTexture(gl.TEXTURE0 + id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; } };
}
function createDoubleFBO(w, h, i, f, t, fl) {
  let a = createFBO(w, h, i, f, t, fl), b = createFBO(w, h, i, f, t, fl);
  return { width: w, height: h, get read() { return a; }, get write() { return b; }, swap() { [a, b] = [b, a]; } };
}

let simW, simH, dyeW, dyeH;
let velocity, dye, divergenceFBO, curlFBO, pressure;
let bloomFBO, bloomChain = [];
let sunraysFBO, sunraysMaskFBO;

function getRes(scale) {
  let w = Math.max(1, Math.round(gl.drawingBufferWidth * scale));
  let h = Math.max(1, Math.round(gl.drawingBufferHeight * scale));
  return { width: w, height: h };
}

function initFBOs() {
  const sr = getRes(C.SIM_RES); simW = sr.width; simH = sr.height;
  // DYE at higher res for crisp visuals
  const dr = getRes(Math.min(1, C.DYE_RES * 2)); dyeW = dr.width; dyeH = dr.height;
  
  velocity = createDoubleFBO(simW, simH, gl.RG16F, gl.RG, gl.HALF_FLOAT, gl.LINEAR);
  dye = createDoubleFBO(dyeW, dyeH, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR);
  divergenceFBO = createFBO(simW, simH, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.NEAREST);
  curlFBO = createFBO(simW, simH, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.NEAREST);
  pressure = createDoubleFBO(simW, simH, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.NEAREST);
  
  initBloom();
  initSunrays();
}

function initBloom() {
  bloomChain = [];
  let w = gl.drawingBufferWidth >> 1, h = gl.drawingBufferHeight >> 1;
  for (let i = 0; i < 6; i++) {
    if (w < 2 || h < 2) break;
    bloomChain.push(createFBO(w, h, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR));
    w >>= 1; h >>= 1;
  }
  bloomFBO = createFBO(gl.drawingBufferWidth >> 1, gl.drawingBufferHeight >> 1, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR);
}

function initSunrays() {
  const r = getRes(0.25);
  sunraysFBO = createFBO(r.width, r.height, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.LINEAR);
  sunraysMaskFBO = createFBO(r.width, r.height, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.LINEAR);
}

// Blit
function blit(target) {
  if (target) { gl.viewport(0, 0, target.width, target.height); gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo); }
  else { gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight); gl.bindFramebuffer(gl.FRAMEBUFFER, null); }
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// Pointer
const pointers = [new (function(){this.id=-1;this.tx=0;this.ty=0;this.px=0;this.py=0;this.dx=0;this.dy=0;this.down=false;this.moved=false;this.color=[0.5,0.3,0.8];})()];

function HSVtoRGB(h,s,v){let r,g,b;const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}return[r,g,b];}
let hueOff = 0;
function genColor() { hueOff += 0.007; return HSVtoRGB(hueOff % 1, 1, 1); }

function updatePos(p, x, y) {
  const r = canvas.getBoundingClientRect();
  p.tx = (x - r.left) / r.width; p.ty = 1 - (y - r.top) / r.height;
  p.px = p.tx; p.py = p.ty; p.dx = 0; p.dy = 0; p.moved = false;
}
function updateMove(p, x, y) {
  const r = canvas.getBoundingClientRect();
  p.px = p.tx; p.py = p.ty;
  p.tx = (x - r.left) / r.width; p.ty = 1 - (y - r.top) / r.height;
  p.dx = p.tx - p.px; p.dy = p.ty - p.py;
  p.moved = Math.abs(p.dx) > 0 || Math.abs(p.dy) > 0;
}

canvas.addEventListener('mousedown', e => { const p = pointers[0]; p.down = true; p.color = C.RAINBOW ? genColor() : C.BRUSH_COLOR; updatePos(p, e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => { const p = pointers[0]; if (!p.down) return; updateMove(p, e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { pointers[0].down = false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); for (let i = 0; i < e.targetTouches.length; i++) { if (i >= pointers.length) pointers.push({id:-1,tx:0,ty:0,px:0,py:0,dx:0,dy:0,down:false,moved:false,color:[0,0,0]}); const p = pointers[i]; p.id = e.targetTouches[i].identifier; p.down = true; p.color = C.RAINBOW ? genColor() : C.BRUSH_COLOR; updatePos(p, e.targetTouches[i].pageX, e.targetTouches[i].pageY); } }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); for (let i = 0; i < e.targetTouches.length; i++) { const p = pointers.find(pp => pp.id === e.targetTouches[i].identifier); if (p) updateMove(p, e.targetTouches[i].pageX, e.targetTouches[i].pageY); } }, { passive: false });
canvas.addEventListener('touchend', e => { for (const t of e.changedTouches) { const p = pointers.find(pp => pp.id === t.identifier); if (p) p.down = false; } });
canvas.addEventListener('wheel', e => { C.BRUSH_RADIUS = Math.max(0.01, Math.min(0.5, C.BRUSH_RADIUS - e.deltaY * 0.0005)); document.getElementById('b-rad').value = C.BRUSH_RADIUS; document.getElementById('v-rad').textContent = C.BRUSH_RADIUS.toFixed(3); }, { passive: true });

// Splat
function splatAt(x, y, dx, dy, color) {
  const p = P.splat;
  gl.useProgram(p.program);
  gl.uniform1i(p.uniforms.u_target, velocity.read.attach(0));
  gl.uniform1f(p.uniforms.u_aspect, canvas.width / canvas.height);
  gl.uniform2f(p.uniforms.u_point, x, y);
  gl.uniform3f(p.uniforms.u_color, dx, dy, 0);
  gl.uniform1f(p.uniforms.u_radius, C.BRUSH_RADIUS / 100);
  blit(velocity.write); velocity.swap();
  
  gl.uniform1i(p.uniforms.u_target, dye.read.attach(0));
  gl.uniform3f(p.uniforms.u_color, color[0], color[1], color[2]);
  gl.uniform1f(p.uniforms.u_radius, C.BRUSH_RADIUS / 100);
  blit(dye.write); dye.swap();
}

// Sim step
function step(dt) {
  if (C.PAUSED) return;
  const tsX = 1 / simW, tsY = 1 / simH;
  
  // Curl
  gl.useProgram(P.curl.program);
  gl.uniform2f(P.curl.uniforms.u_ts, tsX, tsY);
  gl.uniform1i(P.curl.uniforms.u_vel, velocity.read.attach(0));
  blit(curlFBO);
  
  // Vorticity
  gl.useProgram(P.vorticity.program);
  gl.uniform2f(P.vorticity.uniforms.u_ts, tsX, tsY);
  gl.uniform1i(P.vorticity.uniforms.u_vel, velocity.read.attach(0));
  gl.uniform1i(P.vorticity.uniforms.u_curl, curlFBO.attach(1));
  gl.uniform1f(P.vorticity.uniforms.u_str, C.CURL);
  gl.uniform1f(P.vorticity.uniforms.u_dt, dt);
  blit(velocity.write); velocity.swap();
  
  // Divergence
  gl.useProgram(P.divergence.program);
  gl.uniform2f(P.divergence.uniforms.u_ts, tsX, tsY);
  gl.uniform1i(P.divergence.uniforms.u_vel, velocity.read.attach(0));
  blit(divergenceFBO);
  
  // Clear pressure
  gl.useProgram(P.clear.program);
  gl.uniform1i(P.clear.uniforms.u_tex, pressure.read.attach(0));
  gl.uniform1f(P.clear.uniforms.u_val, C.PRESSURE_DISS);
  blit(pressure.write); pressure.swap();
  
  // Pressure solve
  gl.useProgram(P.pressure.program);
  gl.uniform2f(P.pressure.uniforms.u_ts, tsX, tsY);
  gl.uniform1i(P.pressure.uniforms.u_div, divergenceFBO.attach(1));
  for (let i = 0; i < C.PRESSURE_ITERS; i++) {
    gl.uniform1i(P.pressure.uniforms.u_pres, pressure.read.attach(0));
    blit(pressure.write); pressure.swap();
  }
  
  // Gradient subtraction
  gl.useProgram(P.gradSub.program);
  gl.uniform2f(P.gradSub.uniforms.u_ts, tsX, tsY);
  gl.uniform1i(P.gradSub.uniforms.u_pres, pressure.read.attach(0));
  gl.uniform1i(P.gradSub.uniforms.u_vel, velocity.read.attach(1));
  blit(velocity.write); velocity.swap();
  
  // Advect velocity
  gl.useProgram(P.advection.program);
  gl.uniform2f(P.advection.uniforms.u_ts, tsX, tsY);
  gl.uniform1i(P.advection.uniforms.u_vel, velocity.read.attach(0));
  gl.uniform1i(P.advection.uniforms.u_src, velocity.read.attach(0));
  gl.uniform1f(P.advection.uniforms.u_dt, dt);
  gl.uniform1f(P.advection.uniforms.u_diss, C.VEL_DISS);
  blit(velocity.write); velocity.swap();
  
  // Advect dye (higher res)
  const dtx = 1 / dyeW, dty = 1 / dyeH;
  gl.uniform2f(P.advection.uniforms.u_ts, dtx, dty);
  gl.uniform1i(P.advection.uniforms.u_vel, velocity.read.attach(0));
  gl.uniform1i(P.advection.uniforms.u_src, dye.read.attach(1));
  gl.uniform1f(P.advection.uniforms.u_diss, C.DENSITY_DISS);
  blit(dye.write); dye.swap();
}

// Render
function render() {
  // Bloom
  if (C.BLOOM && bloomChain.length > 0) {
    gl.useProgram(P.bloomPrefilter.program);
    gl.uniform1i(P.bloomPrefilter.uniforms.u_tex, dye.read.attach(0));
    gl.uniform1f(P.bloomPrefilter.uniforms.u_threshold, C.BLOOM_THRESHOLD);
    gl.uniform1f(P.bloomPrefilter.uniforms.u_knee, C.BLOOM_SOFT_KNEE);
    blit(bloomFBO);
    
    gl.useProgram(P.bloomBlur.program);
    let last = bloomFBO;
    for (const fbo of bloomChain) {
      gl.uniform2f(P.bloomBlur.uniforms.u_ts, 1/fbo.width, 1/fbo.height);
      gl.uniform1i(P.bloomBlur.uniforms.u_tex, last.attach(0));
      gl.uniform2f(P.bloomBlur.uniforms.u_dir, 1, 0);
      blit(fbo); last = fbo;
    }
    for (let i = bloomChain.length - 2; i >= 0; i--) {
      const fbo = bloomChain[i];
      gl.uniform2f(P.bloomBlur.uniforms.u_ts, 1/fbo.width, 1/fbo.height);
      gl.uniform1i(P.bloomBlur.uniforms.u_tex, last.attach(0));
      gl.uniform2f(P.bloomBlur.uniforms.u_dir, 0, 1);
      blit(fbo); last = fbo;
    }
    gl.useProgram(P.bloomFinal.program);
    gl.uniform1i(P.bloomFinal.uniforms.u_tex, last.attach(0));
    gl.uniform1f(P.bloomFinal.uniforms.u_intensity, C.BLOOM_INTENSITY);
    blit(bloomFBO);
  }
  
  // Sunrays
  if (C.SUNRAYS) {
    gl.useProgram(P.sunraysMask.program);
    gl.uniform1i(P.sunraysMask.uniforms.u_tex, dye.read.attach(0));
    blit(sunraysMaskFBO);
    gl.useProgram(P.sunrays.program);
    gl.uniform1i(P.sunrays.uniforms.u_tex, sunraysMaskFBO.attach(0));
    gl.uniform1f(P.sunrays.uniforms.u_weight, C.SUNRAYS_WEIGHT);
    blit(sunraysFBO);
  }
  
  // Display
  gl.useProgram(P.display.program);
  gl.uniform1i(P.display.uniforms.u_dye, dye.read.attach(0));
  gl.uniform1i(P.display.uniforms.u_bloom, C.BLOOM ? bloomFBO.attach(1) : 0);
  gl.uniform1i(P.display.uniforms.u_sun, C.SUNRAYS ? sunraysFBO.attach(2) : 0);
  gl.uniform1i(P.display.uniforms.u_useBloom, C.BLOOM);
  gl.uniform1i(P.display.uniforms.u_useSun, C.SUNRAYS);
  gl.uniform1i(P.display.uniforms.u_useShading, C.SHADING);
  gl.uniform1f(P.display.uniforms.u_bright, C.BRIGHTNESS);
  gl.uniform1f(P.display.uniforms.u_sat, C.SATURATION);
  gl.uniform3fv(P.display.uniforms.u_bg, C.BG_COLOR);
  gl.uniform1f(P.display.uniforms.u_cm, C.COLOR_MULT);
  gl.uniform1i(P.display.uniforms.u_dither, C.DITHER);
  gl.uniform2f(P.display.uniforms.u_texelSize, 1/dyeW, 1/dyeH);
  gl.uniform1f(P.display.uniforms.u_lightIntensity, C.LIGHT_INTENSITY);
  gl.uniform1f(P.display.uniforms.u_specular, C.SPECULAR);
  gl.uniform1f(P.display.uniforms.u_normalStr, C.NORMAL_STRENGTH);
  blit(null);
}

function randomSplat() {
  const color = genColor();
  const x = Math.random(), y = Math.random();
  const angle = Math.random() * Math.PI * 2;
  const force = 300 + Math.random() * 400;
  splatAt(x, y, Math.cos(angle)*force, Math.sin(angle)*force, [color[0]*40, color[1]*40, color[2]*40]);
}

function clearAll() {
  gl.useProgram(P.clear.program);
  for (const [fbo, swap] of [[velocity, v=>v], [dye, v=>v], [pressure, v=>v]]) {
    gl.uniform1i(P.clear.uniforms.u_tex, fbo.read.attach(0));
    gl.uniform1f(P.clear.uniforms.u_val, 0);
    blit(fbo.write); fbo.swap();
  }
}

// Main loop
const fpsEl = document.getElementById('fps');
let lastT = performance.now(), autoT = 0, frames = 0, fpsT = 0;

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; initFBOs(); }
}

function frame() {
  resize();
  const now = performance.now();
  let dt = Math.min((now - lastT) / 1000, 0.016667);
  lastT = now;
  
  if (C.AUTO && !C.PAUSED) {
    autoT += dt;
    if (autoT >= C.AUTO_INT) { autoT = 0; for (let i = 0; i < C.AUTO_COUNT; i++) randomSplat(); }
  }
  
  for (const p of pointers) {
    if (p.down && p.moved) {
      const color = p.color;
      splatAt(p.tx, p.ty, p.dx*C.BRUSH_FORCE, p.dy*C.BRUSH_FORCE, [color[0]*C.BRUSH_DYE, color[1]*C.BRUSH_DYE, color[2]*C.BRUSH_DYE]);
      p.moved = false;
    }
  }
  
  step(dt);
  render();
  
  frames++; fpsT += dt;
  if (fpsT >= 0.5) { fpsEl.textContent = Math.round(frames/fpsT)+' FPS'; frames=0; fpsT=0; }
  requestAnimationFrame(frame);
}

// UI bindings
function bind(id, key, vid, isF) {
  const el = document.getElementById(id);
  const v = vid ? document.getElementById(vid) : null;
  if (el.type === 'checkbox') { el.checked = C[key]; el.addEventListener('change', () => C[key] = el.checked); }
  else if (el.type === 'range') { el.addEventListener('input', () => { C[key] = parseFloat(el.value); if (v) v.textContent = isF ? parseFloat(el.value).toFixed(2) : el.value; }); }
  else if (el.type === 'color') { el.addEventListener('input', () => { const h = el.value; C[key] = [parseInt(h.substr(1,2),16)/255, parseInt(h.substr(3,2),16)/255, parseInt(h.substr(5,2),16)/255]; }); }
}
bind('s-pi','PRESSURE_ITERS','v-pi'); bind('s-curl','CURL','v-curl');
bind('s-vd','VEL_DISS','v-vd',1); bind('s-dd','DENSITY_DISS','v-dd',1); bind('s-pd','PRESSURE_DISS','v-pd',1);
bind('b-rad','BRUSH_RADIUS','v-rad'); bind('b-force','BRUSH_FORCE','v-force');
bind('b-dye','BRUSH_DYE','v-dye',1); bind('b-rainbow','RAINBOW'); bind('b-color','BRUSH_COLOR');
bind('a-auto','AUTO'); bind('a-int','AUTO_INT','v-int',1); bind('a-count','AUTO_COUNT','v-count');
bind('sh-on','SHADING'); bind('sh-li','LIGHT_INTENSITY','v-li',1); bind('sh-sp','SPECULAR','v-sp',1); bind('sh-ns','NORMAL_STRENGTH','v-ns',1);
bind('v-bright','BRIGHTNESS','v-vb',1); bind('v-sat','SATURATION','v-vs',1); bind('v-cm','COLOR_MULT','v-vm',1);
bind('v-dither','DITHER'); bind('v-bg','BG_COLOR');
bind('p-bloom','BLOOM'); bind('p-bi','BLOOM_INTENSITY','v-bi',1); bind('p-bt','BLOOM_THRESHOLD','v-bt',1); bind('p-sk','BLOOM_SOFT_KNEE','v-sk',1);
bind('p-sun','SUNRAYS'); bind('p-sw','SUNRAYS_WEIGHT','v-sw',1);
bind('d-pause','PAUSED'); bind('d-vel','SHOW_VEL');

document.getElementById('s-res').addEventListener('change', e => { C.SIM_RES = parseFloat(e.target.value); initFBOs(); });
document.getElementById('a-random').addEventListener('click', () => { for (let i = 0; i < 8; i++) randomSplat(); });
document.getElementById('a-clear').addEventListener('click', clearAll);
document.getElementById('a-screenshot').addEventListener('click', () => {
  canvas.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'fluid.png'; a.click(); });
});

// Sections
document.querySelectorAll('.sh').forEach(h => {
  h.addEventListener('click', () => { h.classList.toggle('x'); h.nextElementSibling.classList.toggle('x'); });
});
document.getElementById('toggle').addEventListener('click', () => document.getElementById('ui').classList.toggle('hidden'));

// Init
resize();
for (let i = 0; i < 6; i++) randomSplat();
frame();
</script>
</body>
</html>
